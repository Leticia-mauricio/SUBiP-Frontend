<div class="emprestimo-container">

  <div class="page-header">
    <span class="breadcrumb">Reservas > Nova Reserva</span>
    <h1>Registrar Nova Reserva</h1>
    <p>Preencha as informações abaixo para registrar a reserva.</p>
  </div>

  <form class="emprestimo-form">

    <div class="card">
      <h3>📚 Identificação do Exemplar</h3>
      <div class="form-group">
        <label for="exemplarId">ID do Exemplar</label>
        <input
          id="exemplarId"
          type="number"
          placeholder="Ex.: 1"
          [(ngModel)]="reserva.exemplarId"
          name="exemplarId"
          min="1"
        />
      </div>
      <p class="observacao">O exemplar deve estar com situação <strong>EMPRESTADO</strong> para ser reservado.</p>
    </div>

    <div class="card">
      <h3>👤 Identificação do Leitor</h3>
      <div class="form-group">
        <label for="pessoaId">ID do Leitor</label>
        <input
          id="pessoaId"
          type="number"
          placeholder="Ex.: 1"
          [(ngModel)]="reserva.pessoaId"
          name="pessoaId"
          min="1"
        />
      </div>
    </div>

    @if (erro) {
      <div class="erro-msg">{{ erro }}</div>
    }

    <div class="actions">
      <button type="button" class="btn-cancelar" (click)="cancelar()">
        Cancelar
      </button>
      <button type="button" class="btn-confirmar" (click)="salvar()">
        Confirmar Reserva
      </button>
    </div>

  </form>

</div>
