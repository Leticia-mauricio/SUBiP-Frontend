<div class="container">
  <h2>Excluir Exemplar</h2>

  <div class="card">
    <p class="aviso">
      ⚠️ Atenção: excluir este exemplar pode afetar empréstimos e reservas vinculados a ele.
    </p>
    <p>Deseja realmente excluir o exemplar abaixo?</p>
    <div class="detalhe">
      <p><strong>Tombo:</strong> {{ exemplar.tombo }}</p>
      <p><strong>Situação:</strong> {{ exemplar.situacao | titlecase }}</p>
    </div>

    @if (erro) {
      <p class="erro">{{ erro }}</p>
    }

    <div class="acoes">
      <button class="btn secundario" (click)="cancelar()">Cancelar</button>
      <button class="btn perigo" (click)="excluir()">Excluir</button>
    </div>
  </div>
</div>
