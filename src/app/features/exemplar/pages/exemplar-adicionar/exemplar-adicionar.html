<h2>Adicionar Exemplar</h2>

<input
  type="text"
  placeholder="Tombo do exemplar"
  [(ngModel)]="exemplar.tombo"
/>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="salvar()">
  Salvar
</button>

<p>Nome digitado: {{ exemplar.tombo }}</p>
