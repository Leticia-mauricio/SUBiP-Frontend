<h2>exemplares</h2>

<a routerLink="/gerenciar/exemplares/adicionar">
  Novo exemplar
</a>

<br><br>

<table border="1">

  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let exemplar of exemplares">

      <td>{{ exemplar.id }}</td>

      <td>{{ exemplar.tombo }}</td>

      <td>

        <a
          [routerLink]="[
            '/gerenciar/exemplares/alterar',
            exemplar.id
          ]"
        >
          Editar
        </a>

        |

        <a
          [routerLink]="[
            '/gerenciar/exemplares/excluir',
            exemplar.id
          ]"
        >
          Excluir
        </a>

      </td>

    </tr>

  </tbody>

</table>
