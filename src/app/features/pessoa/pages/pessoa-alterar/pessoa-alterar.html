<h2>Alterar Pessoa</h2>

<div class="form-group">
  <label for="nome">Nome</label>
  <input id="nome" type="text" [(ngModel)]="pessoa.nome" name="nome" />
</div>

<div class="form-group">
  <label for="cpf">CPF</label>
  <input id="cpf" type="text" [(ngModel)]="pessoa.cpf" name="cpf" />
</div>

<div class="form-group">
  <label for="email">E-mail</label>
  <input id="email" type="email" [(ngModel)]="pessoa.email" name="email" />
</div>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="salvar()">Atualizar</button>
