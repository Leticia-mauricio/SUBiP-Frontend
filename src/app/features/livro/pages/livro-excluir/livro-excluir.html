<div class="container">
  <h2>Excluir Livro</h2>

  <div class="card">
    <p class="aviso">
      ⚠️ Atenção: excluir este livro pode afetar exemplares e empréstimos vinculados a ele.
    </p>
    <p>Deseja realmente excluir o livro abaixo?</p>
    <div class="detalhe">
      <p><strong>Título:</strong> {{ livro.titulo }}</p>
      <p><strong>ISBN:</strong> {{ livro.isbn }}</p>
      <p><strong>Gênero:</strong> {{ livro.generoDescricao }}</p>
    </div>

    @if (erro) {
      <p class="erro">{{ erro }}</p>
    }

    <div class="acoes">
      <button class="btn secundario" (click)="cancelar()">Cancelar</button>
      <button class="btn perigo" (click)="excluir()">Excluir</button>
    </div>
  </div>
</div>
