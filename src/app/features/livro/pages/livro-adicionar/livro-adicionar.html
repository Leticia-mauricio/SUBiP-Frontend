<h2>Adicionar livro</h2>

<input
  type="text"
  placeholder="Titulo do livro"
  [(ngModel)]="livro.titulo"
/>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="salvar()">
  Salvar
</button>

<p>Nome digitado: {{ livro.titulo }}</p>
