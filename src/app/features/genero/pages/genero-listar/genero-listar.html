<h2>generos</h2>

<a routerLink="/gerenciar/generos/adicionar">
  Novo genero
</a>

<br><br>

<table border="1">

  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let genero of generos">

      <td>{{ genero.id }}</td>

      <td>{{ genero.descricao }}</td>

      <td>

        <a
          [routerLink]="[
            '/gerenciar/generos/alterar',
            genero.id
          ]"
        >
          Editar
        </a>

        |

        <a
          [routerLink]="[
            '/gerenciar/generos/excluir',
            genero.id
          ]"
        >
          Excluir
        </a>

      </td>

    </tr>

  </tbody>

</table>
