<h2>Excluir Gênero Literário</h2>

<p>Deseja realmente excluir o genero?</p>

<p>
  <strong>{{ genero.descricao }}</strong>
</p>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="excluir()">
  Excluir
</button>
