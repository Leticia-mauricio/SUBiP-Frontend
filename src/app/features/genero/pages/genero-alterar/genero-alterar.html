<h2>Alterar Descricao</h2>

<label for="descricao">
  Descricao
</label>

<input
  id="descricao"
  type="text"
  [(ngModel)]="genero.descricao"
/>

<br><br>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="salvar()">
  Atualizar
</button>
