<div class="emprestimo-container">

  <div class="page-header">
    <h1>Renovação de Empréstimo</h1>

    <p>
      Renove o prazo de devolução do exemplar.
    </p>
  </div>

  <div class="card">

    <div class="form-group">
      <label>ID do Empréstimo</label>

      <input
        type="number"
        [(ngModel)]="emprestimoId">
    </div>

    <div class="form-group">
      <label>Novo Prazo</label>

      <input
        type="date"
        [(ngModel)]="renovacao.dataDevolucaoPrevista">
    </div>

    <div class="actions">

      <button
        class="btn-confirmar"
        (click)="renovar()">

        Renovar

      </button>

    </div>

  </div>

</div>
