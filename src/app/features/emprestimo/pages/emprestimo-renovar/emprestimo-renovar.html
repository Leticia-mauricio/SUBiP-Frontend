<div class="emprestimo-container">

  <div class="page-header">
    <span class="breadcrumb">Empréstimos > Renovar Empréstimo</span>
    <h1>Renovar Empréstimo</h1>
    <p>Informe o ID do empréstimo e a nova data prevista de devolução.</p>
  </div>

  <form class="emprestimo-form">

    <div class="card">
      <h3>📚 Identificação do Empréstimo</h3>

      <div class="form-group">
        <label for="emprestimoId">ID do Empréstimo</label>
        <input
          id="emprestimoId"
          type="number"
          placeholder="Ex.: 1"
          [(ngModel)]="emprestimoId"
          name="emprestimoId"
          min="1"
        />
      </div>

      <div class="form-group">
        <label for="novaData">Nova Data Prevista de Devolução</label>
        <input
          id="novaData"
          type="date"
          [(ngModel)]="renovacao.dataDevolucaoPrevista"
          name="novaData"
        />
      </div>

      <p class="observacao">
        A nova data deve ser posterior à data prevista atual do empréstimo.
      </p>
    </div>

    @if (erro) {
      <div class="erro-msg">{{ erro }}</div>
    }

    <div class="actions">
      <button type="button" class="btn-cancelar" (click)="cancelar()">
        Cancelar
      </button>
      <button type="button" class="btn-confirmar" (click)="renovar()">
        Confirmar Renovação
      </button>
    </div>

  </form>

</div>
