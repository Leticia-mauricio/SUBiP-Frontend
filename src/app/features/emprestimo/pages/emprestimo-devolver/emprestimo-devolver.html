<div class="emprestimo-container">

  <div class="page-header">
    <span class="breadcrumb">Empréstimos > Registrar Devolução</span>
    <h1>Registrar Devolução</h1>
    <p>Informe o ID do empréstimo para registrar a devolução.</p>
  </div>

  <form class="emprestimo-form">

    <div class="card">
      <h3>📚 Identificação do Empréstimo</h3>

      <div class="form-group">
        <label for="emprestimoId">ID do Empréstimo</label>
        <input
          id="emprestimoId"
          type="number"
          placeholder="Ex.: 1"
          [(ngModel)]="emprestimoId"
          name="emprestimoId"
          min="1"
        />
      </div>

      <div class="form-group">
        <label for="dataDevolucao">Data de Devolução</label>
        <input
          id="dataDevolucao"
          type="date"
          [(ngModel)]="devolucao.dataDevolucao"
          name="dataDevolucao"
          [max]="hoje"
        />
      </div>
    </div>

    @if (erro) {
      <div class="erro-msg">{{ erro }}</div>
    }

    <div class="actions">
      <button type="button" class="btn-cancelar" (click)="cancelar()">
        Cancelar
      </button>
      <button type="button" class="btn-confirmar" (click)="devolver()">
        Confirmar Devolução
      </button>
    </div>

  </form>

</div>
