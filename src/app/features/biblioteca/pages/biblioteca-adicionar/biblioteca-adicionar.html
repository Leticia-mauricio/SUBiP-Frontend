<div class="container">
  <h2>Nova Biblioteca</h2>
  <div class="card">
    <div class="grid">
      <div class="campo">
        <label>Nome</label>
        <input type="text" [(ngModel)]="biblioteca.nome" placeholder="Nome da biblioteca">
      </div>
    </div>
    @if (erro) {
      <p class="erro">{{ erro }}</p>
    }
    <div class="acoes">
      <button class="btn secundario" (click)="cancelar()">Cancelar</button>
      <button class="btn" (click)="salvar()">Salvar</button>
    </div>
  </div>
</div>
