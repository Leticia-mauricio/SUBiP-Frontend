<div class="container">
  <h2>Excluir Biblioteca</h2>
  <div class="card">
    <p class="aviso">⚠️ Atenção: excluir esta biblioteca pode afetar exemplares vinculados a ela.</p>
    <p>Deseja realmente excluir a biblioteca abaixo?</p>
    <div class="detalhe">
      <p><strong>Nome:</strong> {{ biblioteca.nome }}</p>
    </div>
    @if (erro) {
      <p class="erro">{{ erro }}</p>
    }
    <div class="acoes">
      <button class="btn secundario" (click)="cancelar()">Cancelar</button>
      <button class="btn perigo" (click)="excluir()">Excluir</button>
    </div>
  </div>
</div>
