<h2>Alterar Biblioteca</h2>

<label for="nome">
  Nome
</label>

<input
  id="nome"
  type="text"
  [(ngModel)]="biblioteca.nome"
/>

<br><br>

@if (erro) {
  <p style="color:red">{{ erro }}</p>
}

<button type="button" (click)="cancelar()" style="margin-right:8px">Cancelar</button>
<button type="button" (click)="salvar()">
  Atualizar
</button>
